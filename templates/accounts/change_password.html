{% extends 'base.html' %}

{% block title %}Change Password{% endblock %}
{% block page_title %}Change Password{% endblock %}

{% block content %}
<div style="max-width:450px;margin:0 auto;">
  <div class="card-panel p-4">
    <div class="form-section-title"><i class="bi bi-key-fill me-2" style="color:var(--accent);"></i>Change Password</div>
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label-custom">Current Password *</label>
        <input type="password" name="old_password" class="form-control-custom" required placeholder="Current password"/>
      </div>
      <div class="mb-3">
        <label class="form-label-custom">New Password *</label>
        <input type="password" name="new_password1" class="form-control-custom" required placeholder="New password"/>
      </div>
      <div class="mb-4">
        <label class="form-label-custom">Confirm New Password *</label>
        <input type="password" name="new_password2" class="form-control-custom" required placeholder="Repeat new password"/>
      </div>
      <button type="submit" class="btn-accent w-100 justify-content-center" style="padding:12px;">
        <i class="bi bi-check-circle-fill"></i> Update Password
      </button>
      <a href="{% url 'profile' %}" class="btn-outline-custom w-100 justify-content-center mt-2" style="padding:12px;">
        <i class="bi bi-x-circle"></i> Cancel
      </a>
    </form>
  </div>
</div>
{% endblock %}
